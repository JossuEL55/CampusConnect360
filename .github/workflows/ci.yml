name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    name: Compilar y probar backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restaurar dependencias
        run: dotnet restore CampusConnect360.slnx

      - name: Compilar
        run: dotnet build CampusConnect360.slnx --no-restore --configuration Release

      - name: Ejecutar tests
        run: dotnet test CampusConnect360.slnx --no-build --configuration Release

  docker-images:
    name: Validar imagenes Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Preparar variables de CI
        run: cp .env.example .env

      - name: Validar configuracion de Compose
        run: docker compose config --quiet

      - name: Construir imagenes
        run: docker compose build
